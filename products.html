<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produits | Billigt Filament</title>
    <link rel="stylesheet" href="Assets/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-grid">
            <a href="index.html" class="logo">BILLIGT<span>FILAMENT</span></a>
            
            <button class="hamburger" id="hamburger" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="main-nav" id="main-nav">
                <a href="index.html">Accueil</a>
                <a href="products.html" class="active">Produits</a>
                <a href="about.html">À propos</a>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 60px 0;">
        <h1 style="font-size: 2.8rem; margin-bottom: 40px; letter-spacing: -2px;">Notre Gamme</h1>

        <div class="filters-wrapper">
            <div class="filter-row">
                <div class="filter-group"> 
                    <label class="filter-label">Rechercher dans le catalogue</label>
                    <input type="text" id="searchField" class="search-input" placeholder="Rechercher ici...">
                </div>
                <div class="filter-group">
                    <label class="filter-label">Trier par</label>
                    <select id="sortOrder" class="sort-select">
                        <option value="default">Plus pertinents</option>
                        <option value="low">Prix : Croissant</option>
                        <option value="high">Prix : Décroissant</option>
                    </select>
                </div>
            </div>

            <div class="material-selection">
                <label class="filter-label">Choisir Catégorie / Matériel</label>
                <div class="material-boxes" id="materialBoxes">
                    <button class="material-btn active" data-cat="all">Tous</button>
                    <button class="material-btn" data-cat="PRINTER">Imprimantes 3D</button>
                </div>
            </div>
        </div>

        <div id="productGrid" class="product-grid"></div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Billigt Filament ApS. Matériaux de qualité pour l'impression 3D.</p>
        </div>
    </footer>
    
    <script src="Assets/script.js"></script>
</body>
</html>
